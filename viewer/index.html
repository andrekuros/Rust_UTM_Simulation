<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTM Simulation Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #222;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            max-width: min(420px, 92vw);
        }

        #resultsPickerRow {
            margin-top: 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        #resultsPickerRow.visible {
            display: flex;
        }

        #experimentSelect,
        #resultsSelect {
            width: 100%;
            max-width: 100%;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #555;
            padding: 6px;
            font-size: 0.82em;
        }

        #experimentSelect {
            font-weight: 600;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        button.secondary {
            background: #444;
        }

        button.secondary:hover {
            background: #555;
        }

        input[type="range"] {
            flex-grow: 1;
        }

        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #timeDisplay {
            min-width: 60px;
            font-variant-numeric: tabular-nums;
        }

        /* Telemetry load progress */
        #loadProgressWrap {
            display: none;
            margin-top: 10px;
            flex-direction: column;
            gap: 6px;
        }

        #loadProgressWrap.visible {
            display: flex;
        }

        .load-progress-track {
            width: 100%;
            height: 10px;
            background: #2a2a2a;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .load-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0d6efd, #5eb3ff);
            border-radius: 4px;
            transition: width 0.12s ease-out;
        }

        .load-progress-bar.indeterminate {
            width: 35% !important;
            animation: loadBarIndet 1.1s ease-in-out infinite;
        }

        @keyframes loadBarIndet {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(380%);
            }
        }

        #loadProgressText {
            font-size: 0.78em;
            color: #9ab;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div id="controls">
        <h3>UTM Telemetry Viewer</h3>
        <input type="file" id="fileInput" accept=".json,.ndjson,application/x-ndjson">
        <div id="status" style="margin-top: 10px; font-size: 0.9em; color: #aaa;">Load simulation_telemetry.ndjson (metadata line includes planned routes), or use the picker when served via <code style="font-size:0.85em">python3 viewer/results_server.py</code> (scans <code style="font-size:0.85em">experiments/</code>).
        </div>
        <div id="loadProgressWrap" aria-hidden="true">
            <div class="load-progress-track">
                <div id="loadProgressBar" class="load-progress-bar"></div>
            </div>
            <div id="loadProgressText"></div>
        </div>
        <div id="resultsPickerRow">
            <div style="font-size:0.85em;color:#8cf;">Experiment → run (newest first within each folder)</div>
            <label for="experimentSelect" style="font-size:0.78em;color:#aaa;">Experiment</label>
            <select id="experimentSelect" aria-label="Experiment project"></select>
            <label for="resultsSelect" style="font-size:0.78em;color:#aaa;">Telemetry file</label>
            <select id="resultsSelect" size="1" aria-label="Saved run"></select>
            <div class="btn-row">
                <button type="button" id="btnRefreshRuns" class="secondary">Refresh list</button>
                <button type="button" id="btnLoadSelected">Load selected</button>
            </div>
        </div>
    </div>

    <div id="ui" style="display: none;">
        <button id="playBtn">Play</button>
        <div style="display: flex; flex-direction: column; flex-grow: 1;">
            <input type="range" id="timeline" min="0" max="100" value="0" step="0.1">
            <div id="timeDisplay" style="font-size: 0.8em; margin-top: 5px;">0.0s / 0.0s</div>
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <label style="font-size: 0.8em;">Speed:</label>
            <select id="playSpeed" style="background: #333; color: white; border: 1px solid #555;">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
                <option value="5">5x</option>
                <option value="10">10x</option>
            </select>
        </div>
        <div style="display: flex; align-items: center; gap: 5px; margin-left: 10px;">
            <input type="checkbox" id="showSuggestions" checked>
            <label style="font-size: 0.8em;" for="showSuggestions">Show DAIDALUS Suggestions</label>
        </div>
        <div style="display: flex; flex-direction: column; gap: 8px; margin-left: 10px; flex-grow: 1; min-width: 0;">
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                <input type="checkbox" id="showRoutes" checked>
                <label style="font-size: 0.85em;" for="showRoutes"><strong>Routes</strong></label>
                <input type="checkbox" id="showPlanned" checked>
                <label style="font-size: 0.8em;" for="showPlanned">Planned (dashed)</label>
                <input type="checkbox" id="showExecuted" checked>
                <label style="font-size: 0.8em;" for="showExecuted">Executed (solid)</label>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 0.78em; color: #ccc;">
                <span title="Show only route data in a sliding sim-time window around the playhead">Time window (sim clock):</span>
                <label>− <input type="number" id="routeWinBehindMin" value="3" min="0" step="0.5" style="width: 3.2em; background: #333; color: #fff; border: 1px solid #555;"> min</label>
                <label>+ <input type="number" id="routeWinAheadMin" value="5" min="0" step="0.5" style="width: 3.2em; background: #333; color: #fff; border: 1px solid #555;"> min</label>
                <span title="Used to turn the time window into approximate along-path length for planned-route clipping">@</span>
                <label><input type="number" id="routeAssumedSpeedMps" value="15" min="1" step="1" style="width: 3.5em; background: #333; color: #fff; border: 1px solid #555;"> m/s</label>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 50000);
        camera.position.set(2000, 2000, 2000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Visual Aids
        const gridHelper = new THREE.GridHelper(10000, 100, 0x222222, 0x111111);
        scene.add(gridHelper);
        scene.add(new THREE.AmbientLight(0x666666));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5000, 10000, 5000);
        scene.add(sun);

        // --- 2. Data State ---
        let times = [];
        let droneTimelines = new Map(); // drone_id -> array of { t, pos, alerts }
        let droneObjects = new Map();
        let metadata = null;
        let padObjects = [];
        let plannedRouteLines = [];
        let executedRouteLines = new Map();
        let isPlaying = false;
        let currentTime = 0;
        let totalTime = 0;
        let playbackSpeed = 1;
        let clock = new THREE.Clock();

        // Procedural Quadcopter Model
        function createQuadcopter() {
            const group = new THREE.Group();

            const body = new THREE.Mesh(
                new THREE.BoxGeometry(20, 5, 20),
                new THREE.MeshLambertMaterial({ color: 0x333333 })
            );
            group.add(body);

            const armGeom = new THREE.BoxGeometry(40, 2, 2);
            const armMat = new THREE.MeshLambertMaterial({ color: 0x555555 });

            const arm1 = new THREE.Mesh(armGeom, armMat);
            arm1.rotation.y = Math.PI / 4;
            group.add(arm1);

            const arm2 = new THREE.Mesh(armGeom, armMat);
            arm2.rotation.y = -Math.PI / 4;
            group.add(arm2);

            const rotorGeom = new THREE.CylinderGeometry(8, 8, 1, 16);
            const rotorMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 });

            [[14, 14], [14, -14], [-14, 14], [-14, -14]].forEach(pos => {
                const rotor = new THREE.Mesh(rotorGeom, rotorMat);
                rotor.position.set(pos[0], 3, pos[1]);
                group.add(rotor);
                rotor.userData.isRotor = true;
            });

            const bubble = new THREE.Mesh(
                new THREE.SphereGeometry(25, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.3, wireframe: true })
            );
            bubble.name = "collision_bubble";
            bubble.visible = false;
            group.add(bubble);

            return group;
        }

        // --- 3. Telemetry Loading ---
        function formatBytes(n) {
            if (n >= 1e9) return (n / 1e9).toFixed(2) + ' GB';
            if (n >= 1e6) return (n / 1e6).toFixed(2) + ' MB';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + ' KB';
            return n + ' B';
        }

        function setLoadProgressVisible(visible) {
            const wrap = document.getElementById('loadProgressWrap');
            const bar = document.getElementById('loadProgressBar');
            if (!visible) {
                wrap.classList.remove('visible');
                wrap.setAttribute('aria-hidden', 'true');
                bar.classList.remove('indeterminate');
                bar.style.width = '0%';
                document.getElementById('loadProgressText').textContent = '';
                document.getElementById('controls').removeAttribute('aria-busy');
                return;
            }
            wrap.classList.add('visible');
            wrap.setAttribute('aria-hidden', 'false');
            document.getElementById('controls').setAttribute('aria-busy', 'true');
        }

        function setLoadProgressState(opts) {
            opts = opts || {};
            const bar = document.getElementById('loadProgressBar');
            const text = document.getElementById('loadProgressText');
            if (opts.indeterminate === true) {
                bar.classList.add('indeterminate');
                bar.style.width = '';
            } else if (opts.indeterminate === false) {
                bar.classList.remove('indeterminate');
            }
            if (opts.percent != null) {
                bar.classList.remove('indeterminate');
                const pct = Math.max(0, Math.min(100, opts.percent));
                bar.style.width = pct + '%';
            }
            if (opts.text != null) text.textContent = opts.text;
        }

        /**
         * Counts bytes and updates the bar. Returns { stream, state } where state.received
         * is updated live (use in parse milestones for combined text).
         */
        function wrapBytesProgress(readable, totalBytes) {
            const state = { received: 0 };
            const stream = readable.pipeThrough(new TransformStream({
                transform(chunk, controller) {
                    state.received += chunk.byteLength;
                    if (totalBytes > 0) {
                        const pct = Math.min(99.5, (state.received / totalBytes) * 100);
                        setLoadProgressState({
                            indeterminate: false,
                            percent: pct,
                            text: `Reading… ${formatBytes(state.received)} / ${formatBytes(totalBytes)}`,
                        });
                    } else {
                        setLoadProgressState({
                            indeterminate: true,
                            text: `Reading… ${formatBytes(state.received)}`
                        });
                    }
                    controller.enqueue(chunk);
                }
            }));
            return { stream, state };
        }

        async function parseNdjsonFromReader(reader, onFrameMilestone) {
            droneTimelines.clear();
            times = [];
            metadata = null;
            let frameCount = 0;
            let maxTime = 0;
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += value;
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    const sline = line.trim();
                    if (!sline) continue;

                    const entry = JSON.parse(sline);

                    if (entry.metadata) {
                        metadata = entry.metadata;
                        continue;
                    }

                    const t = entry.time_elapsed;
                    if (t > maxTime) maxTime = t;

                    if (!droneTimelines.has(entry.drone_id)) {
                        droneTimelines.set(entry.drone_id, []);
                    }

                    droneTimelines.get(entry.drone_id).push({
                        t: t,
                        pos: new Float32Array(entry.position),
                        alerts: entry.collision_alerts || []
                    });

                    frameCount++;
                    if (frameCount % 5000 === 0) {
                        document.getElementById('status').innerText = `Parsed ${frameCount.toLocaleString()} events…`;
                        if (typeof onFrameMilestone === 'function') {
                            onFrameMilestone(frameCount);
                        }
                    }
                }
            }

            totalTime = maxTime;
            times = [0, totalTime];
            return { frameCount, droneCount: droneTimelines.size };
        }

        /**
         * @param source ReadableStream of bytes (Uint8Array) OR fetch Response
         * @param loadingMsg status line
         * @param meta optional { totalBytes } when source is a raw byte stream (e.g. file)
         */
        async function ingestTelemetryStream(source, loadingMsg, meta) {
            meta = meta || {};
            document.getElementById('status').innerText = loadingMsg;
            document.getElementById('ui').style.display = 'none';
            setLoadProgressVisible(true);
            setLoadProgressState({ indeterminate: true, text: 'Starting…' });

            let byteStream;
            let totalBytes = meta.totalBytes || 0;

            if (source instanceof Response) {
                const cl = source.headers.get('Content-Length');
                totalBytes = cl ? parseInt(cl, 10) : 0;
                if (!source.body) throw new Error('no response body');
                byteStream = source.body;
            } else {
                byteStream = source;
            }

            const { stream: monitored, state: byteState } = wrapBytesProgress(byteStream, totalBytes);
            const decoder = new TextDecoderStream();
            const reader = monitored.pipeThrough(decoder).getReader();

            try {
                const { frameCount, droneCount } = await parseNdjsonFromReader(reader, (fc) => {
                    if (fc % 8000 !== 0) return;
                    if (totalBytes > 0) {
                        setLoadProgressState({
                            indeterminate: false,
                            percent: Math.min(99.5, (byteState.received / totalBytes) * 100),
                            text: `Reading… ${formatBytes(byteState.received)} / ${formatBytes(totalBytes)} · parsed ${fc.toLocaleString()} events`
                        });
                    } else {
                        setLoadProgressState({
                            indeterminate: true,
                            text: `Reading… ${formatBytes(byteState.received)} · parsed ${fc.toLocaleString()} events`
                        });
                    }
                });
                setLoadProgressState({ indeterminate: false, percent: 100, text: 'Done' });
                document.getElementById('status').innerText = `Loaded ${frameCount.toLocaleString()} events across ${droneCount} drones.`;
                finalizeViewerLoading();
            } catch (e) {
                throw e;
            } finally {
                setLoadProgressVisible(false);
            }
        }

        document.getElementById('fileInput').addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;
            try {
                await ingestTelemetryStream(file.stream(), `Loading ${file.name}…`, { totalBytes: file.size });
            } catch (err) {
                setLoadProgressVisible(false);
                alert("Error reading stream: " + err.message);
            }
        });

        let cachedRuns = [];
        let cachedExperiments = [];

        function formatRunTime(ts) {
            try {
                return new Date(ts * 1000).toLocaleString();
            } catch (_) {
                return String(ts);
            }
        }

        function runsPoolForExperiment(expId) {
            if (!expId) return cachedRuns;
            const g = cachedExperiments.find(x => x.id === expId);
            return g && g.runs ? g.runs : [];
        }

        function fillExperimentSelect() {
            const es = document.getElementById('experimentSelect');
            es.innerHTML = '';
            const total = cachedRuns.length;
            const o0 = document.createElement('option');
            o0.value = '';
            o0.textContent = `(all experiments) — ${total} run(s)`;
            es.appendChild(o0);
            cachedExperiments.forEach((ex) => {
                const o = document.createElement('option');
                o.value = ex.id;
                o.textContent = `${ex.id} — ${ex.run_count} run(s)`;
                o.title = ex.path || ex.id;
                es.appendChild(o);
            });
        }

        function fillResultsSelect(selectPath) {
            const sel = document.getElementById('resultsSelect');
            const expId = document.getElementById('experimentSelect').value;
            const pool = runsPoolForExperiment(expId);
            sel.innerHTML = '';
            if (pool.length === 0) {
                const o = document.createElement('option');
                o.value = '';
                o.textContent = '(no runs in this experiment)';
                sel.appendChild(o);
                return;
            }
            pool.forEach((run) => {
                const o = document.createElement('option');
                o.value = run.telemetry_path;
                const sz = run.size_bytes >= 1e6 ? (run.size_bytes / 1e6).toFixed(1) + ' MB' : (run.size_bytes / 1e3).toFixed(0) + ' KB';
                const prefix = expId ? '' : `[${run.experiment || '?'}] `;
                o.textContent = `${prefix}${formatRunTime(run.mtime)} — ${run.label} (${sz})`;
                o.title = run.telemetry_path;
                sel.appendChild(o);
            });
            if (selectPath) {
                const idx = pool.findIndex(x => x.telemetry_path === selectPath);
                if (idx >= 0) sel.selectedIndex = idx;
            }
        }

        async function refreshRunsList(selectPath, selectExperimentId) {
            const row = document.getElementById('resultsPickerRow');
            try {
                const r = await fetch('api/runs');
                if (!r.ok) throw new Error('api/runs ' + r.status);
                const data = await r.json();
                cachedRuns = data.runs || [];
                cachedExperiments = data.experiments || [];
                if (cachedRuns.length === 0) {
                    document.getElementById('experimentSelect').innerHTML = '';
                    document.getElementById('resultsSelect').innerHTML = '';
                    const o = document.createElement('option');
                    o.value = '';
                    o.textContent = '(no simulation_telemetry.ndjson found)';
                    document.getElementById('resultsSelect').appendChild(o);
                    row.classList.add('visible');
                    document.getElementById('status').innerText =
                        'No runs under experiments/ — generate telemetry or set VIEWER_RESULTS_GLOBS.';
                    return;
                }
                fillExperimentSelect();
                if (selectExperimentId && cachedExperiments.some(e => e.id === selectExperimentId)) {
                    document.getElementById('experimentSelect').value = selectExperimentId;
                }
                fillResultsSelect(selectPath);
                row.classList.add('visible');
            } catch (err) {
                row.classList.remove('visible');
            }
        }

        async function loadSelectedTelemetryPath(telemetryPath) {
            if (!telemetryPath) return;
            try {
                const url = 'api/telemetry?path=' + encodeURIComponent(telemetryPath);
                const res = await fetch(url);
                if (!res.ok) {
                    const t = await res.text();
                    throw new Error(res.status + ' ' + t);
                }
                if (!res.body) throw new Error('no response body');
                await ingestTelemetryStream(res, 'Loading ' + telemetryPath + '…');
                const u = new URL(window.location.href);
                u.searchParams.set('telemetry', telemetryPath);
                window.history.replaceState({}, '', u);
            } catch (err) {
                setLoadProgressVisible(false);
                alert('Load failed: ' + err.message);
            }
        }

        document.getElementById('experimentSelect').addEventListener('change', () => {
            fillResultsSelect();
        });

        document.getElementById('btnRefreshRuns').addEventListener('click', () => refreshRunsList());
        document.getElementById('btnLoadSelected').addEventListener('click', () => {
            const v = document.getElementById('resultsSelect').value;
            loadSelectedTelemetryPath(v);
        });
        document.getElementById('resultsSelect').addEventListener('dblclick', () => {
            const v = document.getElementById('resultsSelect').value;
            loadSelectedTelemetryPath(v);
        });

        (async function initResultsPickerFromUrl() {
            await refreshRunsList();
            const params = new URLSearchParams(window.location.search);
            const tel = params.get('telemetry');
            if (tel) {
                const hit = cachedRuns.find(x => x.telemetry_path === tel);
                if (hit && hit.experiment) {
                    document.getElementById('experimentSelect').value = hit.experiment;
                    fillResultsSelect(tel);
                } else {
                    document.getElementById('resultsSelect').value = tel;
                }
                await loadSelectedTelemetryPath(tel);
            }
        })();

        /** Match sim “airborne” (e.g. DAA / avoidance) — hide route clutter on ground. */
        const ROUTE_AIRBORNE_Y = 5.0;

        function getRouteWindowParams() {
            const behindMin = Math.max(0, parseFloat(document.getElementById('routeWinBehindMin').value) || 0);
            const aheadMin = Math.max(0, parseFloat(document.getElementById('routeWinAheadMin').value) || 0);
            const v = Math.max(1, parseFloat(document.getElementById('routeAssumedSpeedMps').value) || 15);
            return {
                behindS: behindMin * 60,
                aheadS: aheadMin * 60,
                behindM: behindMin * 60 * v,
                aheadM: aheadMin * 60 * v
            };
        }

        function droneOverlapsSimTimeWindow(timeline, T, behindS, aheadS) {
            if (!timeline || timeline.length === 0) return false;
            const first = timeline[0].t;
            const last = timeline[timeline.length - 1].t;
            const w0 = T - behindS;
            const w1 = T + aheadS;
            return last >= w0 && first <= w1;
        }

        function xzDist2(a, b) {
            const dx = a.x - b.x;
            const dz = a.z - b.z;
            return dx * dx + dz * dz;
        }

        function closestPointOnSegmentXZ(p, a, b) {
            const abx = b.x - a.x;
            const abz = b.z - a.z;
            const apx = p.x - a.x;
            const apz = p.z - a.z;
            const ab2 = abx * abx + abz * abz;
            const t = ab2 < 1e-9 ? 0 : Math.max(0, Math.min(1, (apx * abx + apz * abz) / ab2));
            return new THREE.Vector3(a.x + abx * t, p.y, a.z + abz * t);
        }

        /** Cumulative XZ arc length at each waypoint index. */
        function cumulativeLengthsXZ(pts) {
            const cum = [0];
            for (let i = 0; i < pts.length - 1; i++) {
                const dx = pts[i + 1].x - pts[i].x;
                const dz = pts[i + 1].z - pts[i].z;
                cum.push(cum[cum.length - 1] + Math.sqrt(dx * dx + dz * dz));
            }
            return cum;
        }

        /** Point at arc length `s` along polyline (XZ lengths). */
        function pointOnPolylineAtS(pts, cum, s) {
            const total = cum[cum.length - 1];
            const ss = Math.max(0, Math.min(s, total));
            for (let i = 0; i < pts.length - 1; i++) {
                if (ss >= cum[i] - 1e-4 && ss <= cum[i + 1] + 1e-4) {
                    const seg = cum[i + 1] - cum[i];
                    const t = seg < 1e-6 ? 0 : (ss - cum[i]) / seg;
                    const a = pts[i];
                    const b = pts[i + 1];
                    return new THREE.Vector3(
                        a.x + (b.x - a.x) * t,
                        a.y + (b.y - a.y) * t,
                        a.z + (b.z - a.z) * t
                    );
                }
            }
            return pts[pts.length - 1].clone();
        }

        /** Sub-polyline (XZ arc length) near horizontal position `pos`. */
        function slicePlannedPolylineNear(waypointsVec3, pos, backM, aheadM) {
            if (!waypointsVec3 || waypointsVec3.length < 2) return [];
            const pts = waypointsVec3;
            const cum = cumulativeLengthsXZ(pts);
            const total = cum[cum.length - 1];
            let bestS = 0;
            let bestD2 = Infinity;
            for (let i = 0; i < pts.length - 1; i++) {
                const a = pts[i];
                const b = pts[i + 1];
                const c = closestPointOnSegmentXZ(pos, a, b);
                const d2 = xzDist2(pos, c);
                if (d2 < bestD2) {
                    bestD2 = d2;
                    const seg = cum[i + 1] - cum[i];
                    const abx = b.x - a.x;
                    const abz = b.z - a.z;
                    const apx = c.x - a.x;
                    const apz = c.z - a.z;
                    const ab2 = abx * abx + abz * abz;
                    const t = ab2 < 1e-9 ? 0 : Math.max(0, Math.min(1, (apx * abx + apz * abz) / ab2));
                    bestS = cum[i] + t * seg;
                }
            }
            const sLo = Math.max(0, bestS - backM);
            const sHi = Math.min(total, bestS + aheadM);
            if (sHi <= sLo + 0.5) return [];

            const out = [];
            out.push(pointOnPolylineAtS(pts, cum, sLo));
            for (let i = 0; i < pts.length; i++) {
                if (cum[i] > sLo && cum[i] < sHi) {
                    out.push(pts[i].clone());
                }
            }
            out.push(pointOnPolylineAtS(pts, cum, sHi));
            const thin = [out[0]];
            for (let k = 1; k < out.length; k++) {
                if (thin[thin.length - 1].distanceToSquared(out[k]) > 0.01) {
                    thin.push(out[k]);
                }
            }
            return thin.length >= 2 ? thin : [];
        }

        function colorForDroneId(id) {
            let h = 0;
            for (let i = 0; i < id.length; i++) {
                h = (((h << 5) - h) + id.charCodeAt(i)) | 0;
            }
            return new THREE.Color().setHSL((Math.abs(h) % 360) / 360, 0.7, 0.52);
        }

        function isDroneAirborneAt(timeline, time) {
            const st = getInterpolatedState(timeline, time);
            if (!st) return false;
            return st.pos[1] >= ROUTE_AIRBORNE_Y;
        }

        function clearRouteLines() {
            plannedRouteLines.forEach(l => scene.remove(l));
            plannedRouteLines = [];
            executedRouteLines.forEach(l => scene.remove(l));
            executedRouteLines.clear();
        }

        function setupPlannedRoutes() {
            if (!metadata || !metadata.drone_routes || metadata.drone_routes.length === 0) return;
            for (const r of metadata.drone_routes) {
                if (!r.waypoints || r.waypoints.length < 2) continue;
                const pts = r.waypoints.map(wp => new THREE.Vector3(wp[0], wp[1], wp[2]));
                const geom = new THREE.BufferGeometry().setFromPoints([pts[0], pts[1]]);
                const mat = new THREE.LineDashedMaterial({
                    color: colorForDroneId(r.id),
                    dashSize: 45,
                    gapSize: 28,
                    transparent: true,
                    opacity: 0.78
                });
                const line = new THREE.Line(geom, mat);
                line.computeLineDistances();
                line.userData.droneId = r.id;
                line.userData.plannedPts = pts;
                line.visible = false;
                scene.add(line);
                plannedRouteLines.push(line);
            }
        }

        /** Executed samples in [time − behind, time + ahead] (ahead only affects eligibility; samples are ≤ time). */
        function pointsForExecutedWindowed(timeline, time, behindS, aheadS) {
            if (!timeline || timeline.length === 0) return [];
            const tLo = time - behindS;
            const tHi = time + aheadS;
            const out = [];
            for (let i = 0; i < timeline.length; i++) {
                const ev = timeline[i];
                if (ev.t > tHi) break;
                if (ev.t >= tLo && ev.t <= tHi) {
                    out.push(new THREE.Vector3(ev.pos[0], ev.pos[1], ev.pos[2]));
                }
            }
            const st = getInterpolatedState(timeline, time);
            if (st && time >= tLo && time <= tHi) {
                const cur = new THREE.Vector3(st.pos[0], st.pos[1], st.pos[2]);
                if (out.length === 0) {
                    out.push(cur);
                } else {
                    const last = out[out.length - 1];
                    if (last.distanceToSquared(cur) > 0.0004) out.push(cur);
                }
            }
            return out;
        }

        function updatePlannedRoutesDynamic(time) {
            const master = document.getElementById('showRoutes').checked;
            const showP = document.getElementById('showPlanned').checked;
            const { behindS, aheadS, behindM, aheadM } = getRouteWindowParams();

            plannedRouteLines.forEach(line => {
                if (!master || !showP) {
                    line.visible = false;
                    return;
                }
                const id = line.userData.droneId;
                const tl = droneTimelines.get(id);
                const pts0 = line.userData.plannedPts;
                if (!tl || !pts0 || pts0.length < 2) {
                    line.visible = false;
                    return;
                }
                if (!droneOverlapsSimTimeWindow(tl, time, behindS, aheadS)) {
                    line.visible = false;
                    return;
                }
                if (!isDroneAirborneAt(tl, time)) {
                    line.visible = false;
                    return;
                }
                const st = getInterpolatedState(tl, time);
                if (!st) {
                    line.visible = false;
                    return;
                }
                const cur = new THREE.Vector3(st.pos[0], st.pos[1], st.pos[2]);
                const slice = slicePlannedPolylineNear(pts0, cur, behindM, aheadM);
                if (slice.length < 2) {
                    line.visible = false;
                    return;
                }
                line.geometry.setFromPoints(slice);
                line.computeLineDistances();
                line.visible = true;
            });
        }

        function updateExecutedRoutes(time) {
            const master = document.getElementById('showRoutes').checked;
            const showE = document.getElementById('showExecuted').checked;
            if (!master || !showE) {
                executedRouteLines.forEach(l => { l.visible = false; });
                return;
            }
            const { behindS, aheadS } = getRouteWindowParams();
            droneTimelines.forEach((timeline, id) => {
                if (!droneOverlapsSimTimeWindow(timeline, time, behindS, aheadS)) {
                    const line = executedRouteLines.get(id);
                    if (line) line.visible = false;
                    return;
                }
                if (!isDroneAirborneAt(timeline, time)) {
                    const line = executedRouteLines.get(id);
                    if (line) line.visible = false;
                    return;
                }
                const pts = pointsForExecutedWindowed(timeline, time, behindS, aheadS);
                let line = executedRouteLines.get(id);
                if (pts.length < 2) {
                    if (line) line.visible = false;
                    return;
                }
                if (!line) {
                    const geom = new THREE.BufferGeometry();
                    const mat = new THREE.LineBasicMaterial({
                        color: colorForDroneId(id),
                        transparent: true,
                        opacity: 0.88
                    });
                    line = new THREE.Line(geom, mat);
                    scene.add(line);
                    executedRouteLines.set(id, line);
                }
                line.geometry.setFromPoints(pts);
                line.visible = true;
            });
        }

        function finalizeViewerLoading() {
            if (droneTimelines.size === 0) {
                document.getElementById('status').innerText = `No drones found.`;
                return;
            }

            clearStaticObjects();
            clearRouteLines();
            if (metadata) {
                if (metadata.departure_points) metadata.departure_points.forEach(p => createPad(p, 0x00ff00));
                if (metadata.landing_points) metadata.landing_points.forEach(p => createPad(p, 0x0088ff));
                if (metadata.obstacles) metadata.obstacles.forEach(obs => createObstacle(obs));
                setupPlannedRoutes();
            }

            const timeline = document.getElementById('timeline');
            timeline.max = totalTime;
            timeline.step = 0.1;
            timeline.value = 0;
            document.getElementById('ui').style.display = 'flex';

            currentTime = 0;
            updateUI();
            renderFrame(0);
        }

        function createPad(pos, color) {
            const pad = new THREE.Mesh(
                new THREE.CircleGeometry(30, 32),
                new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
            );
            pad.rotation.x = Math.PI / 2;
            pad.position.set(pos[0], 1, pos[2]);
            scene.add(pad);
            padObjects.push(pad);
        }

        function clearStaticObjects() {
            padObjects.forEach(obj => scene.remove(obj));
            padObjects = [];
        }

        function createObstacle(obs) {
            if (obs.geometry_type === "Cylinder") {
                const geom = new THREE.CylinderGeometry(obs.dimensions[0], obs.dimensions[2], obs.dimensions[1], 32);
                const mat = new THREE.MeshLambertMaterial({ color: 0xff0000, transparent: true, opacity: 0.3 });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(obs.position[0], obs.position[1], obs.position[2]);
                scene.add(mesh);
                padObjects.push(mesh); // Keep track of it to clear later
            } else if (obs.geometry_type === "Box") {
                const geom = new THREE.BoxGeometry(obs.dimensions[0], obs.dimensions[1], obs.dimensions[2]);
                const mat = new THREE.MeshLambertMaterial({ color: 0x4466aa, transparent: true, opacity: 0.7 });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(obs.position[0], obs.position[1], obs.position[2]);
                scene.add(mesh);
                padObjects.push(mesh);
            }
        }

        // Binary search to find events surrounding current time
        function getInterpolatedState(timeline, time) {
            if (timeline.length === 0) return null;
            if (time < timeline[0].t) return null;
            if (time >= timeline[timeline.length - 1].t) {
                if (time > timeline[timeline.length - 1].t + 2.0) return null;
                return timeline[timeline.length - 1];
            }

            let low = 0;
            let high = timeline.length - 1;
            while (low <= high) {
                let mid = Math.floor((low + high) / 2);
                if (timeline[mid].t < time) {
                    low = mid + 1;
                } else if (timeline[mid].t > time) {
                    high = mid - 1;
                } else {
                    return timeline[mid];
                }
            }

            const prev = timeline[high];
            const next = timeline[low];

            const progress = (time - prev.t) / (next.t - prev.t);

            const x = prev.pos[0] + (next.pos[0] - prev.pos[0]) * progress;
            const y = prev.pos[1] + (next.pos[1] - prev.pos[1]) * progress;
            const z = prev.pos[2] + (next.pos[2] - prev.pos[2]) * progress;

            return {
                pos: [x, y, z],
                alerts: prev.alerts
            };
        }

        // --- 4. Render Logic ---
        function renderFrame(time) {
            updateExecutedRoutes(time);
            updatePlannedRoutesDynamic(time);
            droneTimelines.forEach((timeline, id) => {
                const state = getInterpolatedState(timeline, time);

                let group = droneObjects.get(id);
                if (!group) {
                    group = createQuadcopter();
                    scene.add(group);
                    droneObjects.set(id, group);
                }

                if (!state) {
                    group.visible = false;
                    return;
                }

                group.visible = true;
                group.position.set(state.pos[0], state.pos[1], state.pos[2]);

                const bubble = group.getObjectByName("collision_bubble");
                let resolutionLine = group.getObjectByName("resolution_arrow");
                if (!resolutionLine) {
                    resolutionLine = new THREE.ArrowHelper(new THREE.Vector3(0, 0, -1), new THREE.Vector3(0, 0, 0), 150, 0x00ff00, 30, 20);
                    resolutionLine.name = "resolution_arrow";
                    group.add(resolutionLine);
                }

                if (state.alerts && state.alerts.length > 0) {
                    bubble.visible = true;
                    // Find highest alert level
                    const maxAlert = Math.max(...state.alerts.map(a => a.alert_level || 0));
                    if (maxAlert >= 2) {
                        bubble.material.color.setHex(0xff0000); // DAIDALUS warning / strong
                    } else if (maxAlert === 1) {
                        bubble.material.color.setHex(0xffff00); // Corrective
                    } else {
                        // alert_level 0: often "inside threshold distance" but no band from C++ — not the same as level ≥2
                        let minDist = Math.min(...state.alerts.map(a => a.distance));
                        let factor = Math.min(minDist / 50, 1.0);
                        bubble.material.color.setHSL(0.08 + 0.12 * factor, 1, 0.5); // orange family, not red
                    }

                    // Look for resolution bands
                    let bestAlert = state.alerts.find(a => (a.min_safe_heading !== 0 || a.max_safe_heading !== 0));
                    if (bestAlert && document.getElementById('showSuggestions').checked) {
                        resolutionLine.visible = true;
                        let h = bestAlert.min_safe_heading;
                        let dir = new THREE.Vector3(Math.sin(h), 0, -Math.cos(h)).normalize();
                        resolutionLine.setDirection(dir);
                        resolutionLine.setColor(0x00ff00);
                    } else {
                        resolutionLine.visible = false;
                    }
                } else {
                    bubble.visible = false;
                    resolutionLine.visible = false;
                }

                group.children.forEach(c => {
                    if (c.userData.isRotor) c.rotation.y += 0.5;
                });
            });
        }

        function updateUI() {
            document.getElementById('timeline').value = currentTime;
            document.getElementById('timeDisplay').innerText = `${currentTime.toFixed(1)}s / ${totalTime.toFixed(1)}s`;
        }

        // --- 5. Controls ---
        document.getElementById('playBtn').addEventListener('click', () => {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').innerText = isPlaying ? "Pause" : "Play";
            if (isPlaying) clock.getDelta();
        });

        document.getElementById('playSpeed').addEventListener('change', (e) => {
            playbackSpeed = parseFloat(e.target.value);
        });

        function onRouteOptionChange() {
            if (document.getElementById('showPlanned').checked && plannedRouteLines.length === 0 && metadata && metadata.drone_routes) {
                setupPlannedRoutes();
            }
            renderFrame(currentTime);
        }

        document.getElementById('showRoutes').addEventListener('change', onRouteOptionChange);
        document.getElementById('showPlanned').addEventListener('change', onRouteOptionChange);
        document.getElementById('showExecuted').addEventListener('change', onRouteOptionChange);
        ['routeWinBehindMin', 'routeWinAheadMin', 'routeAssumedSpeedMps'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('change', onRouteOptionChange);
            el.addEventListener('input', onRouteOptionChange);
        });

        document.getElementById('timeline').addEventListener('input', (e) => {
            isPlaying = false;
            document.getElementById('playBtn').innerText = "Play";
            currentTime = parseFloat(e.target.value);
            updateUI();
            renderFrame(currentTime);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (isPlaying && totalTime > 0) {
                currentTime += clock.getDelta() * playbackSpeed;
                if (currentTime > totalTime) currentTime = 0;
                updateUI();
                renderFrame(currentTime);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
